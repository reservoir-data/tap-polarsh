name: Test tap-polarsh

on:
  push:
    branches: [main]
    paths:
    - tap_polarsh/**
    - tests/**
    - pyproject.toml
    - uv.lock
    - .github/workflows/test.yaml
  pull_request:
    paths:
    - tap_polarsh/**
    - tests/**
    - pyproject.toml
    - uv.lock
    - .github/workflows/test.yaml
  workflow_dispatch:
  schedule:
  # Run weekly on Monday at 12:00 PM UTC
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.25
  # renovate: datasource=pypi depName=tox
  TOX_VERSION: 4.56.1
  # renovate: datasource=pypi depName=tox-uv
  TOX_UV_VERSION: 1.35.2

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-24.04
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0
        id: baipp

  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: build-package
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}
    - name: Run tests
      env:
        TAP_POLARSH_TOKEN: ${{ secrets.TAP_POLARSH_TOKEN }}
        TAP_POLARSH_START_DATE: ${{ secrets.TAP_POLARSH_START_DATE }}
        MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
      run: >
        uvx
        --with tox-uv=="${TOX_UV_VERSION}"
        --with tox=="${TOX_VERSION}"
        tox -e "${MATRIX_PYTHON_VERSION}" -- --junit-xml=junit.xml
    - uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
      if: ${{ matrix.python-version == '3.14' && success() || failure() }} #  always run even if the previous step fails
      with:
        annotate_only: true
        comment: true
        detailed_summary: true
        include_passed: true
        report_paths: junit.xml

  static:
    runs-on: ubuntu-24.04
    name: Static Analysis
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
    - name: Install tools
      run: >
          uv tool install
          --managed-python
          --with tox-uv=="${TOX_UV_VERSION}"
          --with tox=="${TOX_VERSION}"
          tox
    - name: Static Analysis
      run: tox -m check
